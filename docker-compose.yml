version: "3.8"

services:
  auth:
    build: ./auth
    ports:
      - "4000:4000"
    env_file:
      - .env

  calculator:
    build: ./calculator
    ports:
      - "5000:5000"
    env_file:
      - .env

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - calculator