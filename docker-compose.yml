version: "3.8"

services:
  auth:
    build: ./auth
    ports:
      - "4000:4000"
    env_file:
      - .env

  calculator:
    build: ./calculator
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - history
      - redis
  
  history:
    build: ./history
    ports:
      - "6000:6000"
    env_file:
      - .env
    depends_on:
      - redis

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - calculator
  
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  
volumes:
  redis_data: